<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<title>CEO 트렌드 브리핑</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{
    --purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;
    --teal:#0F6E56;--teal-l:#E1F5EE;
    --amber:#BA7517;--amber-l:#FAEEDA;
    --blue:#185FA5;--blue-l:#E6F1FB;
    --border:#D3D1C7;--text:#2C2C2A;--muted:#5F5E5A;--bg:#FAFAF8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.8;color:var(--text);background:var(--bg)}
  .nav-bar{background:rgba(250,250,248,.96);backdrop-filter:blur(6px);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
  .nav-home{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;padding:4px 14px;border-radius:20px;border:1px solid var(--border);transition:all .15s}
  .nav-home:hover{background:var(--purple-l);border-color:var(--purple);color:var(--purple)}
  .nav-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
  .page{max-width:860px;margin:0 auto;padding:48px 56px;background:white}
  .doc-header{border-bottom:2px solid var(--purple);padding-bottom:24px;margin-bottom:36px}
  .doc-header h1{font-size:26px;font-weight:700;color:var(--purple);line-height:1.3}
  .doc-header .subtitle{font-size:14px;color:var(--muted);margin-top:6px}
  .meta{font-size:12px;color:var(--muted);margin-top:10px;display:flex;gap:10px;flex-wrap:wrap}
  .meta-tag{background:var(--purple-l);color:var(--purple-d);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500}
  .article{border:1px solid var(--border);border-radius:12px;padding:28px 28px 24px;margin-bottom:24px;background:white;transition:border-color .2s,box-shadow .2s}
  .article:hover{border-color:rgba(83,74,183,.3);box-shadow:0 4px 16px rgba(83,74,183,.06)}
  .article-num{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;color:var(--muted);margin-bottom:8px}
  .article h2{font-size:16px;font-weight:700;color:var(--purple);margin-bottom:14px;line-height:1.4}
  .article-body p{font-size:13.5px;color:var(--text);line-height:1.9;margin-bottom:10px}
  .article-body p:last-child{margin-bottom:0}
  .tag{display:inline-block;font-size:10px;padding:1px 8px;border-radius:20px;font-weight:500;margin-right:6px;margin-bottom:10px}
  .tag-general{background:var(--blue-l);color:var(--blue)}
  .tag-finance{background:var(--amber-l);color:var(--amber)}
  .skeleton{background:linear-gradient(90deg,#f0eee8 25%,#e8e6e0 50%,#f0eee8 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;height:14px;margin-bottom:8px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .error-state{text-align:center;padding:60px 24px;color:var(--muted)}
  .error-state h2{font-size:18px;color:var(--purple);margin-bottom:8px}
  .doc-footer{border-top:1px solid var(--border);margin-top:48px;padding-top:16px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px}
  .doc-footer a{color:var(--purple);text-decoration:none}
  .doc-footer a:hover{text-decoration:underline}
  @media(max-width:640px){.page{padding:20px 16px 48px}.article{padding:20px 16px}.doc-header h1{font-size:20px}.doc-footer{flex-direction:column}}
</style>
</head>
<body>

<div class="nav-bar">
  <a href="/briefs/" class="nav-home">← 브리핑 목록</a>
  <span class="nav-date" id="nav-date"></span>
</div>

<div class="page" id="main">
  <!-- skeleton -->
  <div class="doc-header">
    <div class="skeleton" style="width:200px;height:28px;margin-bottom:10px"></div>
    <div class="skeleton" style="width:300px;height:14px"></div>
  </div>
  <div class="article"><div class="skeleton" style="width:60%;height:16px;margin-bottom:12px"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton" style="width:80%"></div></div>
  <div class="article"><div class="skeleton" style="width:55%;height:16px;margin-bottom:12px"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton" style="width:70%"></div></div>
</div>

<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const date = params.get('date');

  document.getElementById('nav-date').textContent = date || '';

  if (!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)) {
    document.getElementById('main').innerHTML = `
      <div class="error-state">
        <h2>날짜를 지정해 주세요</h2>
        <p>예: /briefs/view.html?date=2026-04-20</p>
      </div>`;
    return;
  }

  const base = `/briefs/${date}`;

  // summary.json 로드
  let summary = null;
  try {
    const r = await fetch(`${base}/summary.json`);
    if (r.ok) summary = await r.json();
  } catch {}

  // 아티클 병렬 로드
  const results = await Promise.all(
    [1,2,3,4,5].map(n =>
      fetch(`${base}/article_${n}.txt`)
        .then(r => r.ok ? r.text() : null)
        .catch(() => null)
    )
  );

  const articles = results.filter(Boolean);

  if (!articles.length) {
    document.getElementById('main').innerHTML = `
      <div class="error-state">
        <h2>브리핑을 찾을 수 없습니다</h2>
        <p>${date} 날짜의 브리핑 데이터가 없습니다.</p>
        <p style="margin-top:12px"><a href="/briefs/">← 목록으로 돌아가기</a></p>
      </div>`;
    return;
  }

  // 카테고리 태그 추출 ([일반] / [금융] 접두사)
  function extractTag(title) {
    const m = title.match(/^\[(일반|금융)\]/);
    return m ? m[1] : null;
  }

  // 첫 줄을 제목으로, 나머지를 본문 문단으로 파싱
  function parseArticle(txt) {
    const lines = txt.trim().split('\n').map(l => l.trim()).filter(Boolean);
    const title = lines[0];
    const body = lines.slice(1);
    return { title, body };
  }

  const llm = summary?.llm_used || 'Gemini';
  const runAt = summary?.run_at_kst || date;
  const [yyyy, mm, dd] = date.split('-');
  const displayDate = `${yyyy}년 ${parseInt(mm)}월 ${parseInt(dd)}일`;

  let html = `
<div class="doc-header">
  <h1>📰 CEO 트렌드 브리핑</h1>
  <div class="subtitle">${displayDate} 한국 실시간 트렌드 기반 CEO 인사이트</div>
  <div class="meta">
    <span class="meta-tag">${date}</span>
    <span class="meta-tag">${llm}</span>
    <span class="meta-tag">CEO Room Writer</span>
  </div>
</div>`;

  articles.forEach((txt, i) => {
    const { title, body } = parseArticle(txt);
    const tag = extractTag(title);
    const cleanTitle = title.replace(/^\[(일반|금융)\]\s*/, '');
    const tagHtml = tag
      ? `<span class="tag tag-${tag === '일반' ? 'general' : 'finance'}">${tag}</span>`
      : '';

    const bodyHtml = body.map(p => `<p>${p}</p>`).join('');

    html += `
<div class="article">
  <div class="article-num">${String(i+1).padStart(2,'0')} / ${articles.length}</div>
  ${tagHtml}
  <h2>${cleanTitle}</h2>
  <div class="article-body">${bodyHtml}</div>
</div>`;
  });

  html += `
<div class="doc-footer">
  <span>🤖 CEO Room Writer Agent · ${llm} · GitHub Actions · 자동 생성</span>
  <a href="/briefs/">← 브리핑 목록</a>
</div>`;

  document.getElementById('main').innerHTML = html;
  document.title = `CEO 브리핑 — ${date}`;
})();
</script>
</body>
</html>
