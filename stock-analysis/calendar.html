<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리포트 캘린더 — HCB</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f7f4; --surface: #ffffff; --surface-hover: #f2f0eb;
    --border: #e2dfd6; --border-strong: #c8c4b8;
    --text: #111111; --muted: #999; --muted-dark: #666;
    --accent: #2563eb; --accent-soft: #eff4ff;
    --green: #16a34a; --green-soft: #f0fdf4;
    --mono: 'DM Mono', monospace; --sans: 'Syne', sans-serif;
    --radius: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 14px; line-height: 1.7; -webkit-font-smoothing: antialiased; }
  .page { max-width: 720px; margin: 0 auto; padding: 64px 40px 120px; }

  .nav { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; }
  .back { font-size: 12px; color: var(--muted-dark); text-decoration: none; }
  .back:hover { color: var(--accent); }
  .nav-sep { color: var(--border-strong); }

  h1 { font-family: var(--sans); font-size: 32px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 8px; }
  h1 span { color: var(--accent); }
  .sub { font-size: 12px; color: var(--muted); margin-bottom: 40px; }

  /* Calendar */
  .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
  .cal-dow { text-align: center; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); padding: 6px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day {
    aspect-ratio: 1;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 13px; position: relative;
    min-height: 64px;
  }
  .cal-day.empty { border-color: transparent; background: transparent; }
  .cal-day.other { opacity: .25; }
  .cal-day.today { border-color: var(--accent); }
  .cal-day.has-report {
    background: var(--accent-soft);
    border-color: #bfcffd;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    transition: all .15s;
  }
  .cal-day.has-report:hover { background: #dbeafe; border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(37,99,235,.15); }
  .cal-day .day-num { font-weight: 500; font-size: 14px; }
  .cal-day .day-symbol { font-size: 9px; color: var(--accent); margin-top: 2px; letter-spacing: .02em; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cal-day .day-score { font-size: 9px; color: var(--green); font-weight: 500; }

  /* Report list below calendar */
  .report-list { margin-top: 40px; }
  .report-list-label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .report-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; text-decoration: none; color: var(--text); transition: all .15s; }
  .report-row:hover { border-color: #bfcffd; background: var(--accent-soft); }
  .report-row-left { display: flex; align-items: center; gap: 12px; }
  .report-date { font-size: 12px; color: var(--muted); min-width: 48px; }
  .report-name { font-size: 13px; font-weight: 500; }
  .report-sym { font-size: 11px; color: var(--muted-dark); }
  .report-right { display: flex; align-items: center; gap: 10px; }
  .badge-score { font-size: 11px; background: var(--green-soft); color: var(--green); border: 1px solid #bbf7d0; padding: 2px 8px; border-radius: 3px; }
  .badge-phase { font-size: 11px; background: var(--accent-soft); color: var(--accent); border: 1px solid #bfcffd; padding: 2px 8px; border-radius: 3px; }
  .empty-msg { font-size: 13px; color: var(--muted); text-align: center; padding: 40px 0; }
</style>
</head>
<body>
<div class="page">
  <div class="nav">
    <a class="back" href="index.html">← 증권 분석</a>
    <span class="nav-sep">/</span>
    <span id="nav-label" style="font-size:12px;color:var(--muted-dark)">로딩 중...</span>
  </div>

  <h1 id="page-title">—<span>.</span></h1>
  <p class="sub" id="page-sub">리포트 로딩 중...</p>

  <div class="cal-header">
    <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
    <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div>
    <div class="cal-dow">토</div>
  </div>
  <div class="cal-grid" id="cal"></div>

  <div class="report-list">
    <div class="report-list-label">이달의 리포트</div>
    <div id="list"></div>
  </div>
</div>

<script>
const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const MONTHS_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const BASE = location.pathname.replace(/\/calendar\.html$/, '').replace(/\/$/, '');

function getParams() {
  const p = new URLSearchParams(location.search);
  return { year: parseInt(p.get('year')||new Date().getFullYear()), month: parseInt(p.get('month')||new Date().getMonth()+1) };
}

async function load() {
  const {year, month} = getParams();
  const mi = month - 1;

  document.getElementById('nav-label').textContent = `${year}년 ${MONTHS_KO[mi]}`;
  document.getElementById('page-title').innerHTML = `${year} ${MONTHS_EN[mi]}<span>.</span>`;

  let data = [];
  try {
    const r = await fetch(BASE + '/manifest.json');
    data = await r.json();
  } catch(e) {}

  const mm = String(month).padStart(2,'0');
  const monthly = data.filter(d => d.date.startsWith(`${year}-${mm}-`));
  document.getElementById('page-sub').textContent = `${monthly.length}건의 분석 리포트`;

  // Build report map by day
  const byDay = {};
  monthly.forEach(d => { const day = parseInt(d.date.split('-')[2]); byDay[day] = d; });

  // Calendar
  const firstDow = new Date(year, mi, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, mi + 1, 0).getDate();
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);

  const cal = document.getElementById('cal');
  let html = '';

  // Leading empty cells
  for (let i = 0; i < firstDow; i++) html += '<div class="cal-day empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${mm}-${String(d).padStart(2,'0')}`;
    const report = byDay[d];
    const isToday = dateStr === todayStr;
    if (report) {
      html += `<a class="cal-day has-report${isToday?' today':''}" href="${report.file}">
        <span class="day-num">${d}</span>
        <span class="day-symbol">${report.name||report.symbol}</span>
        <span class="day-score">B${Math.round(report.buffett_score||0)}</span>
      </a>`;
    } else {
      html += `<div class="cal-day${isToday?' today':''}"><span class="day-num">${d}</span></div>`;
    }
  }

  // Trailing empty cells
  const total = firstDow + daysInMonth;
  const trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 0; i < trailing; i++) html += '<div class="cal-day empty"></div>';
  cal.innerHTML = html;

  // List below calendar
  const list = document.getElementById('list');
  if (!monthly.length) { list.innerHTML = '<div class="empty-msg">이달 리포트 없음</div>'; return; }

  const sorted = [...monthly].sort((a,b) => b.date.localeCompare(a.date));
  list.innerHTML = sorted.map(r => `
    <a class="report-row" href="${r.file}">
      <div class="report-row-left">
        <span class="report-date">${r.date.slice(5)}</span>
        <div>
          <div class="report-name">${r.name||r.symbol}</div>
          <div class="report-sym">${r.symbol}</div>
        </div>
      </div>
      <div class="report-right">
        ${r.buffett_score ? `<span class="badge-score">버핏 ${Math.round(r.buffett_score)}</span>` : ''}
        ${r.kospi_phase ? `<span class="badge-phase">${r.kospi_phase}</span>` : ''}
      </div>
    </a>`).join('');
}

load();
</script>
</body>
</html>
