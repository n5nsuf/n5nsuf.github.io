<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<title>리포트 캘린더 — US Equity · Buffett</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;
    --teal:#0F6E56;--teal-l:#E1F5EE;
    --amber:#BA7517;--amber-l:#FAEEDA;
    --blue:#185FA5;--blue-l:#E6F1FB;
    --coral:#993C1D;--coral-l:#FAECE7;
    --red:#A32D2D;--red-l:#FCEBEB;
    --gray:#444441;--gray-l:#F1EFE8;
    --border:#D3D1C7;--text:#2C2C2A;--muted:#5F5E5A;--bg:#FAFAF8;
    --slate:#64748B;--slate-l:#F1F5F9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.8;color:var(--text);background:var(--bg)}
  .page{max-width:860px;margin:0 auto;padding:48px 56px;background:white}
  .nav-bar{position:sticky;top:0;z-index:100;background:rgba(250,250,248,.96);backdrop-filter:blur(6px);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;justify-content:space-between;align-items:center}
  .nav-home{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;padding:4px 14px;border-radius:20px;border:1px solid var(--border);transition:all .15s}
  .nav-home:hover{background:var(--purple-l);border-color:var(--purple);color:var(--purple)}
  .nav-lang{display:flex;gap:6px}
  .lang-btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 14px;border-radius:20px;border:1px solid var(--border);background:white;color:var(--muted);cursor:pointer;transition:all .15s}
  .lang-btn.active{background:var(--purple);color:white;border-color:var(--purple)}
  [lang-ko],[lang-en]{display:none}
  body.lang-ko [lang-ko]{display:revert}
  body.lang-en [lang-en]{display:revert}

  .doc-header{border-bottom:2px solid var(--teal);padding-bottom:24px;margin-bottom:36px}
  .doc-header h1{font-size:28px;font-weight:700;color:var(--teal);line-height:1.3}
  .doc-header .subtitle{font-size:15px;color:var(--muted);margin-top:6px}
  .doc-header .meta{font-size:12px;color:var(--muted);margin-top:10px;display:flex;gap:12px;flex-wrap:wrap}
  .meta-tag{background:var(--teal-l);color:var(--teal);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500}

  h2{font-size:17px;font-weight:700;color:var(--teal);padding:6px 0 6px 12px;border-left:3px solid var(--teal);margin-bottom:16px;margin-top:42px}

  .cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
  .cal-dow{text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:6px 0}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:32px}
  .cal-day{aspect-ratio:1;border-radius:8px;border:1px solid var(--border);background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:13px;position:relative;min-height:60px;transition:all .15s}
  .cal-day.empty{border-color:transparent;background:transparent}
  .cal-day.today{border-color:var(--teal);border-width:2px}
  .cal-day.has-report{background:var(--teal-l);border-color:rgba(15,110,86,.3);cursor:pointer;text-decoration:none;color:var(--text)}
  .cal-day.has-report:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(15,110,86,.15);transform:translateY(-1px)}
  .cal-day .day-num{font-weight:500;font-size:14px;color:var(--gray)}
  .cal-day.has-report .day-num{color:var(--teal);font-weight:700}
  .cal-day .day-sym{font-size:9px;color:var(--teal);margin-top:2px;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cal-day .day-score{font-size:9px;color:var(--amber);font-weight:700}

  .report-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:white;border:1px solid var(--border);border-radius:10px;margin-bottom:6px;text-decoration:none;color:var(--text);transition:all .15s}
  .report-row:hover{border-color:rgba(15,110,86,.3);background:var(--teal-l)}
  .report-row-left{display:flex;align-items:center;gap:12px}
  .report-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);min-width:48px}
  .report-name{font-size:13px;font-weight:700;color:var(--gray)}
  .report-sym{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
  .report-right{display:flex;align-items:center;gap:8px}
  .badge-score{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--teal-l);color:var(--teal);border:1px solid rgba(15,110,86,.2);padding:2px 8px;border-radius:20px}
  .badge-phase{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--blue-l);color:var(--blue);border:1px solid rgba(24,95,165,.2);padding:2px 8px;border-radius:20px}
  .empty-msg{font-size:13px;color:var(--muted);text-align:center;padding:40px 0}

  .doc-footer{border-top:1px solid var(--border);margin-top:48px;padding-top:16px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between}
  .doc-footer a{color:var(--teal);text-decoration:none}
  .doc-footer a:hover{text-decoration:underline}

  @media(max-width:640px){
    .page{padding:20px 16px 48px}.doc-header h1{font-size:21px}
    .cal-day{min-height:44px}.doc-footer{flex-direction:column;gap:6px}
  }
  @media print{
    body{background:white}.page{padding:20px 28px;max-width:100%}.nav-bar{display:none}
    [lang-ko],[lang-en]{display:revert !important}
  }
</style>
</head>
<body class="lang-ko">

<div class="nav-bar">
  <a href="index.html" class="nav-home">← US Equity · Buffett</a>
  <div class="nav-lang">
    <button class="lang-btn active" onclick="setLang('ko')" id="btn-ko">한국어</button>
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">English</button>
  </div>
</div>

<div class="page">

<div class="doc-header">
  <h1 id="page-title">—</h1>
  <div class="subtitle" id="page-sub">로딩 중...</div>
  <div class="meta">
    <span class="meta-tag" lang-ko>월별 캘린더</span>
    <span class="meta-tag" lang-en>Monthly Calendar</span>
  </div>
</div>

<div class="cal-dow-row">
  <div class="cal-dow" lang-ko>일</div><div class="cal-dow" lang-en>Sun</div>
  <div class="cal-dow" lang-ko>월</div><div class="cal-dow" lang-en>Mon</div>
  <div class="cal-dow" lang-ko>화</div><div class="cal-dow" lang-en>Tue</div>
  <div class="cal-dow" lang-ko>수</div><div class="cal-dow" lang-en>Wed</div>
  <div class="cal-dow" lang-ko>목</div><div class="cal-dow" lang-en>Thu</div>
  <div class="cal-dow" lang-ko>금</div><div class="cal-dow" lang-en>Fri</div>
  <div class="cal-dow" lang-ko>토</div><div class="cal-dow" lang-en>Sat</div>
</div>
<div class="cal-grid" id="cal"></div>

<h2 lang-ko>이달의 리포트</h2>
<h2 lang-en>Reports This Month</h2>
<div id="list"></div>

<div class="doc-footer">
  <span><a href="https://github.com/n5nsuf" target="_blank">Github</a> · <a href="../profile.html">Dev Profile</a></span>
  <span>Tech Guides &amp; Projects · 2026</span>
</div>

</div>

<script>
function setLang(lang) {
  document.body.className = 'lang-' + lang;
  document.getElementById('btn-ko').classList.toggle('active', lang === 'ko');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  try { localStorage.setItem('guide-lang', lang); } catch {}
}
(function() {
  try { var s = localStorage.getItem('guide-lang'); if (s) setLang(s); } catch {}
})();

const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const MONTHS_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const BASE = location.pathname.replace(/\/calendar\.html$/, '').replace(/\/$/, '');

function getParams() {
  const p = new URLSearchParams(location.search);
  return { year: parseInt(p.get('year')||new Date().getFullYear()), month: parseInt(p.get('month')||new Date().getMonth()+1) };
}

async function load() {
  const {year, month} = getParams();
  const mi = month - 1;

  document.getElementById('page-title').textContent = `${year} ${MONTHS_EN[mi]}`;
  document.getElementById('page-sub').textContent = `${year}년 ${MONTHS_KO[mi]}`;

  let data = [];
  try {
    const r = await fetch(BASE + '/manifest.json');
    data = await r.json();
  } catch(e) {}

  const mm = String(month).padStart(2,'0');
  const monthly = data.filter(d => d.date.startsWith(`${year}-${mm}-`));

  const byDay = {};
  monthly.forEach(d => { byDay[parseInt(d.date.split('-')[2])] = d; });

  const firstDow = new Date(year, mi, 1).getDay();
  const daysInMonth = new Date(year, mi + 1, 0).getDate();
  const todayStr = new Date().toISOString().slice(0,10);

  const cal = document.getElementById('cal');
  let html = '';
  for (let i = 0; i < firstDow; i++) html += '<div class="cal-day empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${mm}-${String(d).padStart(2,'0')}`;
    const report = byDay[d];
    const isToday = dateStr === todayStr;
    if (report) {
      html += `<a class="cal-day has-report${isToday?' today':''}" href="${report.file}">
        <span class="day-num">${d}</span>
        <span class="day-sym">${report.name||report.symbol}</span>
        <span class="day-score">B${Math.round(report.buffett_score||0)}</span>
      </a>`;
    } else {
      html += `<div class="cal-day${isToday?' today':''}"><span class="day-num">${d}</span></div>`;
    }
  }

  const total = firstDow + daysInMonth;
  const trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 0; i < trailing; i++) html += '<div class="cal-day empty"></div>';
  cal.innerHTML = html;

  const list = document.getElementById('list');
  if (!monthly.length) {
    list.innerHTML = '<div class="empty-msg">이달 리포트 없음 / No reports this month</div>';
    return;
  }

  const sorted = [...monthly].sort((a,b) => b.date.localeCompare(a.date));
  list.innerHTML = sorted.map(r => `
    <a class="report-row" href="${r.file}">
      <div class="report-row-left">
        <span class="report-date">${r.date.slice(5)}</span>
        <div>
          <div class="report-name">${r.name||r.symbol}</div>
          <div class="report-sym">${r.symbol}</div>
        </div>
      </div>
      <div class="report-right">
        ${r.buffett_score ? `<span class="badge-score">Buffett ${Math.round(r.buffett_score)}</span>` : ''}
        ${r.moat ? `<span class="badge-phase">${r.moat}</span>` : (r.kospi_phase ? `<span class="badge-phase">${r.kospi_phase}</span>` : '')}
      </div>
    </a>`).join('');
}

load();
</script>
</body>
</html>
