name: Gemini Edit

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Edit request prompt
        required: true
        type: string
      job_id:
        description: Job UUID for webapp callback (optional)
        required: false
        type: string
        default: ''

concurrency:
  group: gemini-edit
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  edit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install gemini-cli
        run: npm install -g @google/gemini-cli

      - name: Configure git
        run: |
          git config user.name "gemini-edit-bot"
          git config user.email "bot@devprofile-admin.local"

      - name: Write prompt file
        env:
          PROMPT: ${{ inputs.prompt }}
        run: |
          mkdir -p /tmp/gemini-edit
          printf '%s' "$PROMPT" > /tmp/gemini-edit/prompt.txt
          echo "Prompt length: $(wc -c < /tmp/gemini-edit/prompt.txt)"

      - name: Run Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bash scripts/run-gemini.sh /tmp/gemini-edit/prompt.txt

      - name: Commit and push
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes produced"
            exit 0
          fi
          git commit -m "chore: apply gemini edit [job:${JOB_ID:-manual}]"
          git push origin HEAD:main

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/gemini-edit
