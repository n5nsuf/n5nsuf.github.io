name: Gemini Edit

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Edit request prompt
        required: true
        type: string
      job_id:
        description: Job UUID for webapp callback (optional)
        required: false
        type: string
        default: ''

concurrency:
  group: gemini-edit
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  edit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install gemini-cli
        run: npm install -g @google/gemini-cli

      - name: Configure git
        run: |
          git config user.name "gemini-edit-bot"
          git config user.email "bot@devprofile-admin.local"

      - name: Write prompt file
        env:
          PROMPT: ${{ inputs.prompt }}
        run: |
          mkdir -p /tmp/gemini-edit
          printf '%s' "$PROMPT" > /tmp/gemini-edit/prompt.txt

      - name: Run Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bash scripts/run-gemini.sh /tmp/gemini-edit/prompt.txt

      - name: Commit and push
        id: commit
        env:
          JOB_ID: ${{ inputs.job_id }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes produced"
            echo "commit_sha=" >> "$GITHUB_OUTPUT"
            echo "new_pages=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: apply gemini edit [job:${JOB_ID:-manual}]"
          git push origin HEAD:main
          SHA=$(git rev-parse HEAD)
          NEW_FILES=$(git diff HEAD~1 HEAD --name-only --diff-filter=A | grep '^projects/' | head -5 | paste -sd ',' -)
          echo "commit_sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "new_pages=$NEW_FILES" >> "$GITHUB_OUTPUT"

      - name: Notify webapp
        if: always() && inputs.job_id != ''
        env:
          JOB_ID: ${{ inputs.job_id }}
          COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
          NEW_PAGES: ${{ steps.commit.outputs.new_pages }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS_FINAL: ${{ job.status }}
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
        run: |
          if [ -z "$CALLBACK_SECRET" ] || [ -z "$CALLBACK_URL" ]; then
            echo "CALLBACK_SECRET or CALLBACK_URL not set — skipping notify"
            exit 0
          fi
          STATUS="success"
          if [ "$STATUS_FINAL" != "success" ]; then STATUS="failed"; fi
          curl -fsSL -X POST "$CALLBACK_URL" \
            -H "Authorization: Bearer $CALLBACK_SECRET" \
            -H "Content-Type: application/json" \
            --data-binary @- <<EOF
          {
            "job_id": "$JOB_ID",
            "status": "$STATUS",
            "commit_sha": "$COMMIT_SHA",
            "new_pages": "$NEW_PAGES",
            "workflow_url": "$RUN_URL"
          }
          EOF || echo "callback failed — check CALLBACK_URL/CALLBACK_SECRET secrets"

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/gemini-edit
